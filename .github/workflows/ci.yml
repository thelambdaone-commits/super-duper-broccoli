name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff mypy types-requests types-python-dateutil
      - name: Lint with ruff
        run: |
          ruff check .
      - name: Type check with mypy
        run: |
          mypy config/settings.py domain/execution.py ledger/ledger_db.py tests/test_ledger_db.py
      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit --local
      - name: Scan code with bandit
        run: |
          pip install bandit
          ./scripts/run_bandit.sh
      - name: Scan secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing
      - name: Dry-run validation
        run: |
          python main_agentic_clob.py --dry-run --mode PAPER || echo "Dry-run may need .vault_env"
