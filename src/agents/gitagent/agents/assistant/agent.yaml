spec_version: "0.1.0"
name: assistant
version: 1.0.0
description: A general-purpose coding assistant that reads, writes, and refactors code

model:
  preferred: "openai:gpt-4o"
  fallback:
    - "anthropic:claude-sonnet-4-5-20250929"
    - "openai:gpt-4o-mini"
  constraints:
    temperature: 0.3
    max_tokens: 4096

tools: [cli, read, write, memory]

runtime:
  max_turns: 50
  timeout: 120
